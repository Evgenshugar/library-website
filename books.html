<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список книг - Библиотека GF</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .book-cover {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .book-info {
            padding: 15px;
        }
        .book-title {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .book-description {
            color: #666;
            font-size: 14px;
        }
        .back-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="goBack()">Назад</button>
    <h1>Список книг</h1>
    <div id="booksContainer" class="books-grid"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
</body>
</html>
