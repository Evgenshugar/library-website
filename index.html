<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen" class="screen">
        <h1>Добро пожаловать в библиотеку</h1>
        <button id="readerBtn" class="btn">Читатель</button>
        <button id="adminBtn" class="btn">Администратор</button>
    </div>

    <div id="passwordScreen" class="screen hidden">
        <h2>Введите пароль администратора</h2>
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button id="submitPassword" class="btn">Войти</button>
        <button id="backToLogin" class="btn btn-secondary">Назад</button>
    </div>

    <div id="libraryScreen" class="screen hidden">
        <header>
            <h1>Библиотека</h1>
            <div class="user-info">
                <span id="userRole">Читатель</span>
                <button id="logoutBtn" class="btn btn-small">Выйти</button>
            </div>
        </header>

        <div class="content">
            <div id="booksList" class="books-list">
                <!-- Книги будут добавляться здесь -->
            </div>

            <div id="chaptersList" class="chapters-list hidden">
                <h2 id="currentBookTitle"></h2>
                <div id="chaptersContainer"></div>
                <button id="addChapterBtn" class="btn btn-admin hidden">Добавить главу</button>
                <button id="backToBooks" class="btn btn-secondary">Назад к книгам</button>
            </div>

            <div id="chapterContent" class="chapter-content hidden">
                <h2 id="chapterTitle"></h2>
                <div id="contentText"></div>
                <div id="contentImages"></div>
                <button id="editChapterBtn" class="btn btn-admin hidden">Редактировать главу</button>
                <button id="deleteChapterBtn" class="btn btn-admin btn-danger hidden">Удалить главу</button>
                <button id="backToChapters" class="btn btn-secondary">Назад к главам</button>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="addBookModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Добавить книгу</h3>
            <form id="addBookForm">
                <input type="text" id="bookTitle" placeholder="Название книги" required>
                <textarea id="bookDescription" placeholder="Описание (необязательно)"></textarea>
                <input type="file" id="bookCover" accept="image/*">
                <button type="submit" class="btn">Добавить книгу</button>
            </form>
        </div>
    </div>

    <div id="addChapterModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Добавить главу</h3>
            <form id="addChapterForm">
                <input type="text" id="chapterTitle" placeholder="Название главы" required>
                <textarea id="chapterText" placeholder="Текст главы" required></textarea>
                <input type="file" id="chapterImages" accept="image/*" multiple>
                <button type="submit" class="btn">Добавить главу</button>
            </form>
        </div>
    </div>

    <script src="script.json"></script>
</body>
</html>
