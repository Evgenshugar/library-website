<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Электронная библиотека</h1>
            <button id="adminLogin" class="btn">Вход для админа</button>
        </header>

        <div id="bookList" class="section">
            <h2>Список книг</h2>
            <div id="booksContainer"></div>
        </div>

        <div id="chapterList" class="section hidden">
            <h2 id="currentBookTitle"></h2>
            <button id="backToBooks" class="btn btn-secondary">Назад к книгам</button>
            <ul id="chaptersContainer"></ul>
        </div>

        <div id="chapterContent" class="section hidden">
            <h2 id="currentChapterTitle"></h2>
            <button id="backToChapters" class="btn btn-secondary">Назад к главам</button>
            <div id="contentDisplay"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
