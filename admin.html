<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Админ-панель библиотеки</h1>
            <button onclick="logout()" class="btn secondary-btn">Выйти</button>
        </header>
        
        <div class="admin-content">
            <div class="books-management">
                <h2>Управление книгами</h2>
                <div id="admin-books-container"></div>
                
                <div class="add-book-form">
                    <h3>Добавить новую книгу</h3>
                    <input type="text" id="new-book-title" placeholder="Название книги">
                    <textarea id="new-book-description" placeholder="Описание книги"></textarea>
                    <input type="file" id="new-book-cover" accept="image/*">
                    <button onclick="addBook()" class="btn">Добавить книгу</button>
                </div>
            </div>
            
            <div class="chapters-management hidden" id="chapters-management">
                <button onclick="backToBooksAdmin()" class="btn back-btn">← Назад к книгам</button>
                <h2 id="admin-current-book"></h2>
                
                <div id="admin-chapters-container"></div>
                
                <div class="add-chapter-form">
                    <h3>Добавить новую главу</h3>
                    <input type="text" id="new-chapter-title" placeholder="Название главы">
                    <textarea id="new-chapter-content" placeholder="Содержимое главы (поддерживает HTML)"></textarea>
                    <button onclick="addChapter()" class="btn">Добавить главу</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
